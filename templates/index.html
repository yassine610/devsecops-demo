<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DevSecOps Demo App (Version Sécurisée)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4fdf4; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #4CAF50; border-radius: 10px; background-color: white; }
        h2 { color: #4CAF50; }
        input[type="text"] { width: 70%; padding: 10px; }
        input[type="submit"] { padding: 10px 20px; background-color: #4CAF50; color: black; font-weight: bold; border: none; cursor: pointer; }
        .results { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Recherche Utilisateur (Version Sécurisée 🛡️)</h2>
        <form method="POST">
            <input type="text" name="query" placeholder="Nom de l'utilisateur (ex: Alice)" required>
            <input type="submit" value="Rechercher">
        </form>
        
        <div class="results">
            <h3>Résultats :</h3>
            <ul>
                {% for row in results %}
                    <li>{{ row }}</li>
                {% else %}
                    <li>Aucun résultat.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
